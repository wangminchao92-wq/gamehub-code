# ============================================
# GameHub Docker Compose 配置
# ============================================

version: '3.8'

services:
  # 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: gamehub-db
    environment:
      POSTGRES_USER: gamehub
      POSTGRES_PASSWORD: gamehub_password
      POSTGRES_DB: gamehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamehub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamehub-network

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: gamehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamehub-network

  # 应用服务 (开发环境)
  app-dev:
    build:
      context: .
      target: development
    container_name: gamehub-app-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://gamehub:gamehub_password@postgres:5432/gamehub?schema=public"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gamehub-network
    command: npm run dev

  # 应用服务 (生产环境)
  app-prod:
    build:
      context: .
      target: production
    container_name: gamehub-app-prod
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://gamehub:gamehub_password@postgres:5432/gamehub?schema=public"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gamehub-network
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: gamehub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app-prod
    networks:
      - gamehub-network
    restart: unless-stopped

  # 监控服务 (Prometheus + Grafana)
  prometheus:
    image: prom/prometheus:latest
    container_name: gamehub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - gamehub-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: gamehub-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - gamehub-network
    restart: unless-stopped

# 网络配置
networks:
  gamehub-network:
    driver: bridge

# 数据卷配置
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: